<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Info</title>
</head>

<body>
    <h1>Hello, {{ name }}!</h1>

    {% if age >= 18 %}
    <p>You are an adult.</p>
    {% else %}
    <p>You are a minor.</p>
    {% endif %}

    <h2>Your favorite foods:</h2>
    <ul>
        {% for food in favorite_foods %}
        <li>{{ food }}</li>
        {% endfor %}
    </ul>
</body>

</html>
